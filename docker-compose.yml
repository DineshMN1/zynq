services:
  postgres:
    image: postgres:16-alpine
    container_name: zynqcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zynqcloud-network

  zynqcloud:
    image: ${ZYNQCLOUD_IMAGE:-DineshMN1/zynqcloud:latest}
    container_name: zynqcloud
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 80
      STATIC_DIR: /app/static
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${DATABASE_NAME}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      FILE_STORAGE_PATH: /data/files
      FILE_ENCRYPTION_MASTER_KEY: ${FILE_ENCRYPTION_MASTER_KEY}
      DISK_STATS_PATH: ${DISK_STATS_PATH:-/data/files}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      INVITE_TOKEN_TTL_HOURS: ${INVITE_TOKEN_TTL_HOURS:-72}
      PUBLIC_REGISTRATION: ${PUBLIC_REGISTRATION:-false}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      MAX_CONCURRENT_UPLOADS: ${MAX_CONCURRENT_UPLOADS:-256}
      MAX_ASSEMBLY_WORKERS: ${MAX_ASSEMBLY_WORKERS:-32}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      MIN_FREE_BYTES: ${MIN_FREE_BYTES:-536870912}
    ports:
      - '${APP_PORT:-3000}:80'
    volumes:
      - zynq_files:/data/files
    networks:
      - zynqcloud-network

  # ── Cloudflare Tunnel (optional) ─────────────────────────────────────────────
  # Exposes ZynqCloud on a public domain without opening any inbound ports.
  # Enable with:  docker compose --profile cloudflare up -d
  #
  # Quick setup (token — no credentials file needed):
  #   1. Cloudflare Zero Trust → Networks → Tunnels → Create tunnel → Docker
  #   2. Copy the tunnel token shown on screen
  #   3. Pass it at runtime (never store in .env):
  #        CLOUDFLARE_TUNNEL_TOKEN=<token> docker compose --profile cloudflare up -d
  #   4. In the dashboard set the public hostname target to  http://zynqcloud:80
  #   5. Update CORS_ORIGIN, FRONTEND_URL and COOKIE_DOMAIN to your tunnel domain
  #
  # Alternative (credentials file — token never touches Docker env):
  #   1. Run on the host:
  #        cloudflared login
  #        cloudflared tunnel create zynqcloud
  #        cloudflared tunnel route dns zynqcloud <your-domain>
  #   2. Copy ~/.cloudflared/<tunnel-id>.json → ./cloudflared/credentials.json
  #      Copy ~/.cloudflared/cert.pem         → ./cloudflared/cert.pem
  #   3. Create ./cloudflared/config.yml:
  #        tunnel: <tunnel-id>
  #        credentials-file: /etc/cloudflared/credentials.json
  #        ingress:
  #          - service: http://zynqcloud:80
  #   4. Uncomment the volumes block below and remove the environment block
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: zynqcloud-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # volumes:                                      # ← credentials-file method
    #   - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - zynqcloud
    networks:
      - zynqcloud-network
    profiles:
      - cloudflare

volumes:
  postgres_data:
    driver: local
  zynq_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZYNQ_DATA_PATH:?ZYNQ_DATA_PATH is required}

networks:
  zynqcloud-network:
    driver: bridge
