# Development: runs only PostgreSQL.
# Go API and Vite dev server run natively on the host for instant hot reload.
#
# Usage:
#   pnpm dev:db    — start postgres (run once)
#   pnpm dev:api   — start Go API   (terminal 1)
#   pnpm dev:web   — start Vite     (terminal 2)
services:
  postgres:
    image: postgres:16-alpine
    container_name: zynqcloud-postgres-dev
    environment:
      POSTGRES_USER: ${DATABASE_USER:-zynqcloud}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-supersecret_db_pass}
      POSTGRES_DB: ${DATABASE_NAME:-zynqcloud}
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-zynqcloud} -d ${DATABASE_NAME:-zynqcloud}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_dev_data:
    driver: local
