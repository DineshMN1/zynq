name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/zynqcloud
  STORAGE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/zynq-storage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Main app image ────────────────────────────────────────────────────
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ── Go storage service image ──────────────────────────────────────────
      - name: Build and push storage service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/go-storage
          file: ./services/go-storage/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.STORAGE_IMAGE }}:latest
            ${{ env.STORAGE_IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=storage
          cache-to: type=gha,mode=max,scope=storage

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docker-compose.yml
            .env.example
            install.sh
            update.sh
          body: |
            ## Docker Images

            ```bash
            # App
            docker pull ${{ env.APP_IMAGE }}:${{ steps.version.outputs.VERSION }}
            # Storage service
            docker pull ${{ env.STORAGE_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ```

            ## Fresh Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/DineshMN1/zynq/main/install.sh | bash
            ```

            ## Update Existing Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/DineshMN1/zynq/main/update.sh | bash
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
