name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect what changed so downstream jobs can skip when irrelevant ──────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'server/**'
            frontend:
              - 'web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            docker:
              - 'Dockerfile'
              - 'docker/**'
              - '.dockerignore'
              - 'server/**'
              - 'web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ── Go backend: vet, fmt, vuln scan, test, build ─────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Format check
        working-directory: server
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Run gofmt on these files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vulnerability scan
        working-directory: server
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        working-directory: server
        run: go test -race -count=1 -timeout 120s ./...

      - name: Build
        working-directory: server
        run: CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o /dev/null ./cmd/api

  # ── React frontend: lint, test, build ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @zynqcloud/web lint

      - name: Test
        run: pnpm --filter @zynqcloud/web test

      - name: Build
        run: pnpm --filter @zynqcloud/web build
        env:
          VITE_API_URL: /api/v1

  # ── Docker: build the production image ───────────────────────────────────────
  # Runs after backend + frontend regardless of whether they were skipped,
  # but only when docker-relevant files changed (or on push to main).
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: |
      always() &&
      (needs.changes.outputs.docker == 'true' || github.event_name != 'pull_request') &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t zynqcloud:ci .
