name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/server/**'
            frontend:
              - 'apps/client/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'docker/**'
              - '.dockerignore'
              - 'apps/server/**'
              - 'apps/client/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache: true
          cache-dependency-path: apps/server/go.sum

      - name: go vet
        working-directory: apps/server
        run: go vet ./...

      - name: go fmt check
        working-directory: apps/server
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Run gofmt on these files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        working-directory: apps/server
        run: go test -race -count=1 -timeout 120s ./...

      - name: go build
        working-directory: apps/server
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /dev/null ./cmd/api

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @zynqcloud/client lint

      - name: Test
        run: pnpm --filter @zynqcloud/client test

      - name: Build
        run: pnpm --filter @zynqcloud/client build
        env:
          VITE_API_URL: /api/v1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        backend-lint-test,
        frontend-lint-test,
      ]
    if: >
      (needs.changes.outputs.docker == 'true' || github.event_name == 'push') &&
      (needs.backend-lint-test.result == 'success' || needs.backend-lint-test.result == 'skipped') &&
      (needs.frontend-lint-test.result == 'success' || needs.frontend-lint-test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t zynqcloud:ci .
