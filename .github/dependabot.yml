version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: weekly
    labels: ['dependencies', 'ci']
    groups:
      actions:
        patterns: ['*']

  # ── npm (web frontend) ───────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/web'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ['dependencies']
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: ['minor', 'patch']
      security-all:
        applies-to: security-updates
        patterns: ['*']

  # ── Go (server) ─────────────────────────────────────────────
  - package-ecosystem: 'gomod'
    directory: '/server'
    schedule:
      interval: weekly
    labels: ['dependencies']
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: ['minor', 'patch']
      security-all:
        applies-to: security-updates
        patterns: ['*']

  # ── Docker base images ───────────────────────────────────────
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: monthly
    labels: ['dependencies', 'docker']
